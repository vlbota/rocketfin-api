# ── Database ──────────────────────────────────────────────────────────────────
quarkus.datasource.db-kind=postgresql
quarkus.datasource.username=${USERNAME_DB_ROCKETFIN}
quarkus.datasource.password=${PASSWORD_DB_ROCKETFIN}
quarkus.datasource.jdbc.url=jdbc:postgresql://${ADDRESS_DB_ROCKETFIN}/rocketfin_db
quarkus.hibernate-orm.database.generation=validate

# ── Mailer ────────────────────────────────────────────────────────────────────
#quarkus.mailer.host=smtp.gmail.com
