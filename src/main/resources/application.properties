#quarkus.mailer.start-tls=REQUIRED
#quarkus.mailer.from=rocketfin@example.com
#quarkus.mailer.username=rocketfin@example.com
#quarkus.mailer.password=mock-email-password

# ── Telegram ──────────────────────────────────────────────────────────────────
env.telegram.bot=${TELEGRAM_BOT}
env.telegram.chat.message-fails=${TELEGRAM_CHAT_MSG_FAILS}

# ── Paths ─────────────────────────────────────────────────────────────────────
env.path.front-end=${FRONT_PATH}
env.path.back-end=${BACK_PATH}

# ── JWT ───────────────────────────────────────────────────────────────────────
# Gere o par de chaves com:
#   openssl genrsa -out private.pem 2048
#   openssl pkcs8 -topk8 -nocrypt -in private.pem -out privateKey.pem
#   openssl rsa -in private.pem -pubout -out publicKey.pem
# Copie os arquivos .pem para src/main/resources/
mp.jwt.verify.issuer=rocketfin
mp.jwt.verify.publickey.location=publicKey.pem
smallrye.jwt.sign.key.location=privateKey.pem

# ── RabbitMQ ──────────────────────────────────────────────────────────────────
quarkus.rabbitmq-client.hostname=localhost
quarkus.rabbitmq-client.port=5672
quarkus.rabbitmq-client.username=guest
quarkus.rabbitmq-client.password=guest
quarkus.rabbitmq-client.virtual-host=/
